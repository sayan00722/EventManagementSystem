{% extends 'base.html' %}
{% block content %}
<section class="panel">
    <div class="row-between">
        <a class="btn btn-outline" href="{{ url_for('admin.dashboard') }}">Home</a>
        <form method="post" action="{{ url_for('auth.logout') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-outline" type="submit">LogOut</button>
        </form>
    </div>
    <h2 class="banner">Reports</h2>
    <div class="grid-3">
        <div class="card metric"><h3>Total Orders</h3><p>{{ total_orders }}</p></div>
        <div class="card metric"><h3>Transactions</h3><p>{{ completed_txn }}</p></div>
        <div class="card metric"><h3>Revenue</h3><p>Rs {{ revenue }}</p></div>
    </div>
</section>
{% endblock %}
