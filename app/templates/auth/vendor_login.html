{% extends 'base.html' %}
{% block content %}
<section class="panel auth-panel">
    <div class="row-between mb-2">
        <a class="btn btn-primary" href="{{ url_for('auth.login_selector') }}">CART</a>
        <a class="btn btn-primary" href="{{ url_for('auth.login_selector') }}">BACK</a>
    </div>
    <h1 class="banner">Event Management System</h1>
    <h2>Vendor Login</h2>
    <form method="post" class="form-grid">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>User Id / Email</label>
        <input name="email" type="email" required>
        <label>Password</label>
        <input name="password" type="password" required>
        <div class="action-row">
            <a class="btn btn-muted" href="{{ url_for('auth.login_selector') }}">Cancel</a>
            <button class="btn btn-primary" type="submit">Login</button>
        </div>
    </form>
</section>
{% endblock %}
